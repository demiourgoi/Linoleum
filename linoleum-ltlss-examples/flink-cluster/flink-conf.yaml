################################################################################
#  Flink standalone cluster configuration for Linoleum load testing.
#
#  Starts 5 TaskManager JVMs (2 GB each) + 1 JobManager on localhost.
#  Designed to work around the Maude interpreter lock by giving each
#  parallel subtask its own JVM.
################################################################################

# Java runtime — must be Java 8 or 11 for Flink 1.20 compatibility
env.java.home: /usr/lib64/jvm/java-1.8.0-openjdk

# JobManager
jobmanager.rpc.address: localhost
jobmanager.rpc.port: 6123
jobmanager.memory.process.size: 1600m

# TaskManager — each TM gets 2 GB of heap+off-heap (total process memory)
taskmanager.memory.process.size: 2048m
# One slot per TM so each Maude interpreter runs in its own JVM
taskmanager.numberOfTaskSlots: 1

# Default parallelism — distributes work across all 5 TMs
parallelism.default: 5

# Restart strategy: none (for load testing we want to observe failures directly)
restart-strategy.type: none

# Disable checkpointing (disabled by default — not needed for stateless load test)
# execution.checkpointing.interval is NOT set because 0 is rejected by Flink.

# Web UI (same port as the local mini-cluster so bookmarks still work)
rest.port: 8081
rest.bind-address: 0.0.0.0

# Allow multiple TMs on the same host (let Flink auto-assign ports)
taskmanager.data.port: 0

# Classloader: parent-first (default). Flink and Scala versions match now.
classloader.resolve-order: parent-first

# Protobuf serialization for OTEL span types.
# Must be in flink-conf.yaml for standalone mode (can't be set programmatically).
pipeline.serialization-config:
  - "io.opentelemetry.proto.collector.trace.v1.ExportTraceServiceRequest: {type: kryo, kryo-type: registered, class: com.twitter.chill.protobuf.ProtobufSerializer}"
  - "io.github.demiourgoi.linoleum.messages.SpanInfo: {type: kryo, kryo-type: registered, class: com.twitter.chill.protobuf.ProtobufSerializer}"
