################################################################################
#  Flink standalone cluster configuration for Linoleum load testing.
#
#  Starts 5 TaskManager JVMs (2 GB each) + 1 JobManager on localhost.
#  Designed to work around the Maude interpreter lock by giving each
#  parallel subtask its own JVM.
################################################################################

# Java runtime — must be Java 8 or 11 for Flink 1.20 compatibility
env.java.home: /usr/lib64/jvm/java-1.8.0-openjdk

# JobManager
jobmanager.rpc.address: kymera
jobmanager.rpc.port: 6123
jobmanager.memory.process.size: 1600m

# TaskManager — each TM gets 2 GB of heap+off-heap (total process memory)
taskmanager.memory.process.size: 2048m
# One slot per TM so each Maude interpreter runs in its own JVM
taskmanager.numberOfTaskSlots: 1

# Default parallelism — distributes work across all 5 TMs
parallelism.default: 5

# Restart strategy: none (for load testing we want to observe failures directly)
restart-strategy.type: none

# Disable checkpointing (disabled by default — not needed for stateless load test)
# execution.checkpointing.interval is NOT set because 0 is rejected by Flink.

# Web UI (same port as the local mini-cluster so bookmarks still work)
rest.port: 8081
rest.bind-address: 0.0.0.0

# Allow multiple TMs on the same host (let Flink auto-assign ports)
taskmanager.data.port: 0

# Classloader: parent-first (default). Flink and Scala versions match now.
classloader.resolve-order: parent-first

# Protobuf compatibility flag (see app/build.gradle FIXME)
env.java.opts: -Dcom.google.protobuf.use_unsafe_pre22_gencode

# Protobuf serialization for OTEL span types.
# Per Flink docs: uses bracket-delimited string format for List<String> config.
pipeline.serialization-config: "[io.opentelemetry.proto.collector.trace.v1.ExportTraceServiceRequest: {type: kryo, kryo-type: registered, class: com.twitter.chill.protobuf.ProtobufSerializer}, io.opentelemetry.proto.trace.v1.ResourceSpans: {type: kryo, kryo-type: registered, class: com.twitter.chill.protobuf.ProtobufSerializer}, io.opentelemetry.proto.trace.v1.ScopeSpans: {type: kryo, kryo-type: registered, class: com.twitter.chill.protobuf.ProtobufSerializer}, io.opentelemetry.proto.trace.v1.Span: {type: kryo, kryo-type: registered, class: com.twitter.chill.protobuf.ProtobufSerializer}, io.opentelemetry.proto.resource.v1.Resource: {type: kryo, kryo-type: registered, class: com.twitter.chill.protobuf.ProtobufSerializer}, io.opentelemetry.proto.common.v1.KeyValue: {type: kryo, kryo-type: registered, class: com.twitter.chill.protobuf.ProtobufSerializer}, io.opentelemetry.proto.common.v1.AnyValue: {type: kryo, kryo-type: registered, class: com.twitter.chill.protobuf.ProtobufSerializer}, io.opentelemetry.proto.common.v1.InstrumentationScope: {type: kryo, kryo-type: registered, class: com.twitter.chill.protobuf.ProtobufSerializer}, io.github.demiourgoi.linoleum.messages.SpanInfo: {type: kryo, kryo-type: registered, class: com.twitter.chill.protobuf.ProtobufSerializer}]"
