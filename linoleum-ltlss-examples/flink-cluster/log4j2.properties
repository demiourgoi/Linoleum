################################################################################
#  Flink standalone cluster log4j2 configuration for Linoleum load testing.
#
#  Keeps Flink's default structure but sets the Linoleum logger to ERROR
#  to avoid OOM from excessive Maude term logging under load.
################################################################################

rootLogger.level = INFO
rootLogger.appenderRef.console.ref = ConsoleAppender

# Flink's own loggers (keep defaults)
logger.flink.name = org.apache.flink
logger.flink.level = INFO

logger.akka.name = akka
logger.akka.level = INFO

logger.kafka.name = org.apache.kafka
logger.kafka.level = INFO

logger.hadoop.name = org.apache.hadoop
logger.hadoop.level = INFO

logger.zookeeper.name = org.apache.zookeeper
logger.zookeeper.level = INFO

# Linoleum — set to ERROR during load tests to avoid log-spam OOM
logger.linoleum.name = io.github.demiourgoi.linoleum
logger.linoleum.level = ERROR

# Console appender
appender.console.name = ConsoleAppender
appender.console.type = CONSOLE
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{yyyy-MM-dd HH:mm:ss,SSS} %-5p %-60c %x - %m%n

# Suppress Akka's "rpc error" disconnection noise during normal cluster shutdown
logger.akka-rpc.name = org.apache.flink.runtime.rpc.akka.AkkaRpcService
logger.akka-rpc.level = WARN
