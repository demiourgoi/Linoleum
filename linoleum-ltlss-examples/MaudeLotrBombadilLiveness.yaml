name: "everytime the user mentions Tom Bombadil, lotrbot eventually gets angry"
program: "maude/lotrbot_bombadil_liveness.maude"
module: "BOMBADIL-LIVENESS-PROPS"
monitor-oid: 'mon("liveness")'
initial-soup: 'initConfig(mon("liveness"))'
property: "bombadilSafeSatisfied"
key-by:
    type: "by-string-span-attribute"
    key: "lotrbot.chat_id"
dependency-programs:
    - "maude/json/date.maude"
    - "maude/json/value.maude"
    - "maude/json/json.maude"
rl-hooks:
    - operator-name: "isPoliteText"
      hook-supplier-fqn: "io.github.demiourgoi.linoleum.examples.IsPoliteTextOpHook.apply"
state-config:
    ttl-seconds: 60
config:
    message-rewrite-bound: 100
    session-gap-seconds: 5
    allowed-lateness-seconds: 0
