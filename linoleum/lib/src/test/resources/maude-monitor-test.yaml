name: "Test Maude Monitor"
program: "maude/lotrbot_imagegen_safety.maude"
module: "LOTRBOT-IMAGE-SAFETY"
monitor-oid: "monitor"
initial-soup: "< monitor : Monitor | state : initial >"
property: "safe"
key-by:
  type: "by-string-attribute"
  key: "agent.name"
dependency-programs: []
dependency-stdlib-programs: []
eq-hooks:
  - operator-name: "testOp"
    hook-supplier-fqn: "io.github.demiourgoi.linoleum.config.monitor.MaudeMonitorConfigTest.getHook"
rl-hooks: []
state-config:
  ttl-seconds: 3600
  should-ignore-window-fqn: "io.github.demiourgoi.linoleum.config.monitor.MaudeMonitorConfigTest.shouldIgnoreWindow"
config:
  message-rewrite-bound: 100
  session-gap-seconds: 300
  allowed-lateness-seconds: 0
